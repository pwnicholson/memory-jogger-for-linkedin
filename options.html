<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Jogger - Notes Dashboard</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="options.css">
</head>
<body class="mjli-options-page">
  <div class="mjli-options-container">
    <header class="mjli-options-header">
      <h1>Memory Jogger - Notes Dashboard</h1>
      <p>View, edit, and manage all your LinkedIn notes</p>
    </header>

    <section class="mjli-review-callout" aria-label="Chrome Web Store review prompt">
      <p class="mjli-review-callout-text">If you like this app, leave us a review on the Chrome Web Store.</p>
      <a
        class="mjli-review-callout-btn"
        href="https://chromewebstore.google.com/detail/ncjgomhiffjiipeoikbnpjnkicedeckl?utm_source=item-share-cb"
        target="_blank"
        rel="noopener noreferrer"
      >Leave a Review</a>
    </section>

    <div class="mjli-options-toolbar">
      <div class="mjli-search-container">
        <input 
          type="text" 
          id="mjli-search-input" 
          class="mjli-search-input"
          placeholder="Search notes by name or content..."
        >
      </div>
      <div class="mjli-storage-info">
        <span id="mjli-storage-usage">Loading...</span>
      </div>
      <div class="mjli-toolbar-actions">
        <button id="mjli-export-btn" class="mjli-btn-primary">Export Notes</button>
        <button id="mjli-import-btn" class="mjli-btn-secondary">Import Notes</button>
        <select id="mjli-date-format" class="mjli-date-format-select" title="Date display format">
          <option value="yyyy-mm-dd" selected>Date Format: YYYY-MM-DD</option>
          <option value="mm-dd-yyyy">Date Format: MM-DD-YYYY</option>
          <option value="dd-mm-yyyy">Date Format: DD-MM-YYYY</option>
        </select>
        <button id="mjli-diagnostics-btn" class="mjli-btn-secondary">🔍 Diagnostics</button>
        <label class="mjli-dev-toggle" title="Enable extra console logs for debugging profile note loading">
          <input type="checkbox" id="mjli-dev-logging-toggle">
          <span>Dev logging</span>
        </label>
        <input type="file" id="mjli-import-file" accept=".json" style="display:none;">
      </div>
    </div>

    <div class="mjli-tabs">
      <button id="mjli-tab-people" class="mjli-tab is-active" data-tab="people">👤 People</button>
      <button id="mjli-tab-companies" class="mjli-tab" data-tab="companies">🏢 Companies</button>
    </div>

    <div class="mjli-options-content">
      <div id="mjli-notes-list" class="mjli-notes-list">
        <div class="mjli-loading">Loading notes...</div>
      </div>
    </div>

    <!-- Edit Modal -->
    <div id="mjli-edit-modal" class="mjli-modal" style="display: none;">
      <div class="mjli-modal-content">
        <div class="mjli-modal-header">
          <h2>Edit Note</h2>
          <button class="mjli-modal-close" id="mjli-modal-close">&times;</button>
        </div>
        <div class="mjli-modal-body">
          <div class="mjli-profile-info">
            <span id="mjli-edit-profile-name" class="mjli-profile-name"></span>
          </div>
          <textarea
            id="mjli-edit-textarea"
            class="mjli-textarea"
            placeholder="e.g., Met at TechCon 2024... worked together at Acme Corp..."
            maxlength="200"
          ></textarea>
          <div class="mjli-modal-connected-row" id="mjli-modal-connected-row">
            <label for="mjli-edit-connected-on" class="mjli-modal-connected-label">Connected on</label>
            <input
              id="mjli-edit-connected-on"
              type="date"
              class="mjli-modal-connected-input"
            >
          </div>
          <div class="mjli-edit-footer">
            <div class="mjli-counter-section">
              <span id="mjli-edit-counter" class="mjli-counter">0 / 200</span>
              <span class="mjli-preview-hint">💡 First 60 characters show in preview</span>
            </div>
          </div>
        </div>
        <div class="mjli-modal-footer">
          <button id="mjli-modal-cancel" class="mjli-btn-secondary">Cancel</button>
          <button id="mjli-modal-save" class="mjli-btn-primary">Save</button>
        </div>
      </div>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
